# .github/workflows/selenium-ci.yml
name: Selenium Test Automation Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Cho phép người dùng chạy thủ công từ tab Actions

jobs:
  run-tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false # Đảm bảo job thứ 2 vẫn chạy nếu job đầu tiên thất bại
      matrix:
        # matrix.browser sẽ được truyền vào lệnh mvn test qua biến ${{ matrix.browser }}
        browser: [chrome, firefox]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven # Giúp tăng tốc độ tải các thư viện Maven cho lần chạy sau

      - name: Run Selenium Tests on ${{ matrix.browser }}
        # Lệnh chạy test truyền biến browser từ matrix và nhận credential từ GitHub Secrets
        run: |
          echo "------ SECURITY CHECK: VERIFYING MASKED SECRETS ------"
          echo "Target Browser: ${{ matrix.browser }}"
          echo "Saucedemo Username should be masked: $SAUCEDEMO_USERNAME"
          echo "--------------------------------------------------------"
          
          mvn clean test -Dbrowser=${{ matrix.browser }} -Denv=dev -DsuiteXmlFile=testng-smoke.xml
        env:
          # Truyền các Secret bảo mật từ GitHub Settings vào biến môi trường hệ thống
          SAUCEDEMO_USERNAME: ${{ secrets.SAUCEDEMO_USERNAME }}
          SAUCEDEMO_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}

      - name: Upload Test Results and Screenshots for ${{ matrix.browser }}
        if: always() # Luôn chạy kể cả khi test fail để nộp bài
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }}
          path: |
            target/surefire-reports/
            target/screenshots/
          retention-days: 7
