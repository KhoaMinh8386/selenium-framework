# .github/workflows/selenium-ci.yml
name: Selenium Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  run-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # Đảm bảo nếu Chrome lỗi thì Firefox vẫn chạy tiếp
      matrix:
        browser: [ chrome, firefox ] # Chạy song song 2 trình duyệt
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven # Caches Maven dependencies for faster subsequent builds

      - name: Run Selenium Tests (Chrome Headless)
        run: |
          mvn clean test -Dbrowser=chrome -Denv=dev -DsuiteXmlFile=testng-smoke.xml
        env:
          # Ensure secret SAUCEDEMO_PASSWORD is set in GitHub Repository Secrets
          APP_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}

      - name: Upload Test Results and Screenshots
        if: always() # Always run even if previous steps (tests) fail
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }} # Tên riêng cho từng trình duyệt
          path: |
            target/surefire-reports/
            target/screenshots/
          retention-days: 30
